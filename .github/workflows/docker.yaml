name: Docker  
  
on:  
  workflow_dispatch:  
  push:  
    branches: [ main ]  
  
env:  
  ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}  
  ALIYUN_NAME_SPACE: ${{ secrets.ALIYUN_NAME_SPACE }}  
  ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}  
  ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}  
  
jobs:  
  
  build:  
    name: Pull and Push  
    runs-on: ubuntu-latest  
    steps:  
    - name: Setup Docker buildx  
      uses: docker/setup-buildx-action@v1  
  
    - name: Check out code  
      uses: actions/checkout@v2  
  
    - name: Login to Aliyun Container Registry  
      run: |  
        echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.ALIYUN_REGISTRY_USER }}" --password-stdin "${{ secrets.ALIYUN_REGISTRY }}"  
  
    - name: Pull and push images to Aliyun  
      run: |  
        while IFS= read -r line; do  
          docker pull "$line"  
          image_parts=($(echo "$line" | awk -F/ '{print $NF}' | awk -F: '{print $1, $2}'))  
          image_name="${image_parts[0]}"  
          image_tag="${image_parts[1]}"  
          new_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$image_name:$image_tag"  
          echo "Tagging image $line to $new_image"  
          docker tag "$line" "$new_image"  
          echo "Pushing image $new_image"  
          docker push "$new_image"  
        done < images.txt
